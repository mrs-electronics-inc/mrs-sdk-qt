name: Build MRS SDK Qt VM Image

on:
  pull_request: # DELETEME
  workflow_dispatch:

concurrency:
  group: vm-build
  cancel-in-progress: false

jobs:
  build-vm:
    name: Build VMDK Image
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      actions: write

    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          docker-images: false

      - uses: actions/checkout@v4

      - name: Extract version tag if applicable
        id: vars
        run: |
          # Extract version tag if this is a tagged release
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${{ github.ref }}"
            VERSION="${VERSION#refs/tags/}"
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
          fi

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Build VMDK image
        working-directory: vm
        run: |
          BUILD_ARGS=()

          # Use TCG accelerator in GitHub Actions (no KVM support)
          BUILD_ARGS+=(--var "accelerator=kvm")

          # Set longer timeout for slow TCG emulation (4 hours)
          BUILD_ARGS+=(--timeout 480)

          # Add version tag if this is a tagged release
          if [[ -n "${{ steps.vars.outputs.version }}" ]]; then
            BUILD_ARGS+=(--var "version=${{ steps.vars.outputs.version }}")
          fi

          ./build-vm.sh "${BUILD_ARGS[@]}" --verbose
        timeout-minutes: 480

      - name: Upload VM artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: mrs-sdk-qt-vm-images
          path: |
            vm/output/*.vmdk
            vm/output/manifest.json
          retention-days: 30
          compression-level: 0
