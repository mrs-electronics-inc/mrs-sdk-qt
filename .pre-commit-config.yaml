fail_fast: true
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v21.1.8
    hooks:
      - id: clang-format
        types: [c++, c, header]
  - repo: local
    hooks:
      - id: moon-fix
        name: moon fix
        entry: moon run :fix --affected --status=staged
        language: system
        pass_filenames: false
        stages: [pre-commit]
